<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>&#1047;&#1072;&#1073;&#1088;&#1086;&#1085;&#1102;&#1074;&#1072;&#1090;&#1080; &#1079;&#1081;&#1086;&#1084;&#1082;&#1091; &#8212; Nazarii Kozak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0705; --ink:#F2ECE3; --ink-dim:#B7A99A; --ink-mute:#7C6C5E;
    --ember:#C1702F; --ember-2:#E0A468; --line:rgba(243,236,226,0.12);
    --f-display:'Archivo Black',sans-serif; --f-body:'Archivo',sans-serif;
    --ok:#7FB069; --err:#e07a6a;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--f-body);
        min-height:100dvh; display:flex; align-items:center; justify-content:center;
        padding:32px 18px; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

  /* ---- blurred video backdrop ---- */
  .bg{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover;
       filter:blur(9px) saturate(1.05) brightness(0.7); transform:scale(1.12); }
  .bg-tint{ position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(70% 60% at 50% 40%, rgba(193,112,47,0.18), transparent 65%),
      linear-gradient(180deg, rgba(11,7,4,0.55), rgba(11,7,4,0.72)); }
  .grain{ position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* ---- glass card ---- */
  .card{ position:relative; z-index:5; width:100%; max-width:480px;
    background:rgba(20,13,10,0.42);
    -webkit-backdrop-filter:blur(26px) saturate(1.2); backdrop-filter:blur(26px) saturate(1.2);
    border:1px solid rgba(243,236,226,0.14); border-radius:22px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 30px 80px rgba(0,0,0,0.55);
    padding:30px 28px 26px; }

  .brand{ font-family:var(--f-display); font-size:15px; letter-spacing:0.04em; }
  .brand span{ color:var(--ember-2); }
  .card h1{ font-family:var(--f-display); font-size:clamp(30px,7vw,42px); line-height:0.95;
            margin-top:14px; }
  .card .sub{ color:var(--ink-mute); font-size:13px; margin-top:8px; }

  form{ display:flex; flex-direction:column; gap:16px; margin-top:22px; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .field{ display:flex; flex-direction:column; gap:7px; }
  .field > span{ font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); }
  input[type=text], textarea{
    background:rgba(243,236,226,0.05); border:1px solid var(--line); border-radius:10px;
    padding:12px 13px; color:var(--ink); font-family:var(--f-body); font-size:14px; resize:vertical;
    transition:border-color .2s, background .2s; }
  input:focus, textarea:focus{ outline:none; border-color:var(--ember-2); background:rgba(193,112,47,0.06); }
  input::placeholder, textarea::placeholder{ color:var(--ink-mute); }
  .honeypot{ position:absolute; left:-9999px; width:1px; height:1px; opacity:0; }

  /* booking picker */
  .bk__hint{ font-size:12px; color:var(--ink-mute); }
  .bk__dates{ display:flex; gap:9px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; }
  .bk__dates::-webkit-scrollbar{ display:none; }
  .bk__date{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:2px;
    min-width:60px; padding:10px 9px; cursor:pointer; background:rgba(243,236,226,0.04);
    border:1px solid var(--line); border-radius:10px; color:var(--ink-dim); font-family:var(--f-body);
    transition:border-color .2s, background .2s, color .2s; }
  .bk__date:hover{ border-color:var(--ember-2); color:var(--ink); }
  .bk__date.on{ border-color:var(--ember-2); background:rgba(193,112,47,0.14); color:var(--ink); }
  .bk__date .wd{ font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-mute); }
  .bk__date.on .wd{ color:var(--ember-2); }
  .bk__date .d{ font-family:var(--f-display); font-size:19px; line-height:1; }
  .bk__date .m{ font-size:10px; text-transform:uppercase; color:var(--ink-mute); }
  .bk__times{ display:flex; flex-wrap:wrap; gap:8px; }
  .bk__time{ padding:8px 14px; cursor:pointer; background:rgba(243,236,226,0.04); border:1px solid var(--line);
    border-radius:999px; color:var(--ink-dim); font-family:var(--f-body); font-size:13px;
    font-variant-numeric:tabular-nums; transition:border-color .2s, background .2s, color .2s;
    display:inline-flex; align-items:center; gap:6px; }
  .bk__time:hover{ border-color:var(--ember-2); color:var(--ink); }
  .bk__time.on{ border-color:var(--ember-2); background:var(--ember); color:#160b06; font-weight:600; }
  .bk__time--taken{ cursor:not-allowed; opacity:0.55; border-style:dashed; color:var(--ink-mute); }
  .bk__time--taken:hover{ border-color:var(--line); color:var(--ink-mute); }
  .bk__time--taken i{ font-style:normal; font-size:9px; text-transform:uppercase; color:var(--ink-mute); }
  .bk__chosen{ font-size:13px; color:var(--ember-2); }
  .bk__warn{ font-size:12px; color:var(--ember-2); }

  .submit{ position:relative; overflow:hidden; border:none; cursor:pointer; margin-top:4px;
    padding:15px 24px; border-radius:999px; font-family:var(--f-body); font-size:12px; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; color:#160b06;
    background:linear-gradient(180deg,var(--ember-2),var(--ember));
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.4), 0 8px 26px rgba(193,112,47,0.35);
    transition:transform .25s, box-shadow .25s; }
  .submit:hover{ transform:translateY(-2px); box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 12px 32px rgba(193,112,47,0.45); }
  .submit:disabled{ opacity:0.7; cursor:not-allowed; }
  .status{ font-size:13px; min-height:16px; text-align:center; }
  .status.ok{ color:var(--ember-2); } .status.err{ color:var(--err); }

  .socials{ display:flex; justify-content:center; gap:26px; margin-top:22px; padding-top:20px;
            border-top:1px solid var(--line); }
  .socials a{ color:var(--ink-mute); display:flex; transition:color .2s; }
  .socials a:hover{ color:var(--ember-2); }

  @media (max-width:440px){ .row{ grid-template-columns:1fr; } .card{ padding:24px 20px 22px; } }
  @media (prefers-reduced-motion:reduce){ .bg{ filter:blur(9px) brightness(0.7); } }
</style>
</head>
<body>

<video class="bg" autoplay loop muted playsinline poster="assets/hero-poster.jpg">
  <source src="assets/showreel.mp4" type="video/mp4" />
</video>
<div class="bg-tint"></div>
<div class="grain" aria-hidden="true"></div>

<main class="card">
  <div class="brand">NK<span>.</span></div>
  <h1>&#1047;&#1072;&#1073;&#1088;&#1086;&#1085;&#1102;&#1074;&#1072;&#1090;&#1080;<br>&#1079;&#1081;&#1086;&#1084;&#1082;&#1091;</h1>
  <p class="sub">&#1054;&#1073;&#1077;&#1088;&#1080; &#1074;&#1110;&#1083;&#1100;&#1085;&#1091; &#1076;&#1072;&#1090;&#1091; &#1081; &#1095;&#1072;&#1089; &#8212; &#1087;&#1110;&#1076;&#1090;&#1074;&#1077;&#1088;&#1076;&#1078;&#1091; &#1087;&#1088;&#1086;&#1090;&#1103;&#1075;&#1086;&#1084; &#1076;&#1085;&#1103;.</p>

  <form id="bookForm" novalidate>
    <div class="row">
      <label class="field">
        <span>&#1030;&#1084;'&#1103;</span>
        <input type="text" name="name" autocomplete="name" required />
      </label>
      <label class="field">
        <span>&#1058;&#1077;&#1083;&#1077;&#1092;&#1086;&#1085; / Telegram / Email</span>
        <input type="text" name="contact" autocomplete="tel" required />
      </label>
    </div>

    <div class="field">
      <span>&#1044;&#1072;&#1090;&#1072; &#1081; &#1095;&#1072;&#1089;</span>
      <p class="bk__hint" id="bkDatesHint">&#1047;&#1072;&#1074;&#1072;&#1085;&#1090;&#1072;&#1078;&#1077;&#1085;&#1085;&#1103; &#1074;&#1110;&#1083;&#1100;&#1085;&#1080;&#1093; &#1076;&#1072;&#1090;&#8230;</p>
      <div class="bk__dates" id="bkDates"></div>
      <p class="bk__hint" id="bkTimesHint" hidden>&#1058;&#1072;&#1087;&#1085;&#1080; &#1087;&#1077;&#1088;&#1096;&#1091; &#1074;&#1110;&#1083;&#1100;&#1085;&#1091; &#1075;&#1086;&#1076;&#1080;&#1085;&#1091;, &#1087;&#1086;&#1090;&#1110;&#1084; &#1086;&#1089;&#1090;&#1072;&#1085;&#1085;&#1102; &#8212; &#1079;&#1072;&#1073;&#1088;&#1086;&#1085;&#1102;&#1108;&#1096; &#1091;&#1074;&#1077;&#1089;&#1100; &#1087;&#1088;&#1086;&#1084;&#1110;&#1078;&#1086;&#1082;.</p>
      <div class="bk__times" id="bkTimes" hidden></div>
      <p class="bk__chosen" id="bkChosen" hidden></p>
      <p class="bk__warn" id="bkWarn" hidden></p>
      <input type="hidden" name="date" id="bkDate" />
      <input type="hidden" name="times" id="bkTimesInput" />
    </div>

    <label class="field">
      <span>&#1054;&#1087;&#1080;&#1089; &#1087;&#1088;&#1086;&#1108;&#1082;&#1090;&#1091; <em style="font-style:normal;opacity:.6">(&#1085;&#1077;&#1086;&#1073;&#1086;&#1074;'&#1103;&#1079;&#1082;&#1086;&#1074;&#1086;)</em></span>
      <textarea name="message" rows="2" placeholder="&#1065;&#1086; &#1079;&#1085;&#1110;&#1084;&#1072;&#1108;&#1084;&#1086;, &#1076;&#1077;, &#1092;&#1086;&#1088;&#1084;&#1072;&#1090;&#8230;"></textarea>
    </label>

    <input type="text" name="honeypot" class="honeypot" tabindex="-1" autocomplete="off" aria-hidden="true" />

    <button type="submit" class="submit" id="submitBtn">&#1047;&#1072;&#1073;&#1088;&#1086;&#1085;&#1102;&#1074;&#1072;&#1090;&#1080; &#1079;&#1081;&#1086;&#1084;&#1082;&#1091;</button>
    <p class="status" id="status" role="status" aria-live="polite"></p>
  </form>

  <div class="socials" aria-label="&#1057;&#1086;&#1094;&#1110;&#1072;&#1083;&#1100;&#1085;&#1110; &#1084;&#1077;&#1088;&#1077;&#1078;&#1110;">
    <a href="#" target="_blank" rel="noopener" aria-label="Instagram">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1"/></svg>
    </a>
    <a href="#" target="_blank" rel="noopener" aria-label="YouTube">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2.5" y="5.5" width="19" height="13" rx="4"/><path d="M10.5 9.5l5 2.5-5 2.5v-5z" fill="currentColor" stroke="none"/></svg>
    </a>
    <a href="#" target="_blank" rel="noopener" aria-label="Telegram">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 4L2.5 11.5l6 2 2 6 3-4 4.5 3.5L21 4z"/><path d="M8.5 13.5L19 6"/></svg>
    </a>
  </div>
</main>

<script>
  const form = document.getElementById('bookForm');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');
  const datesEl = document.getElementById('bkDates');
  const datesHint = document.getElementById('bkDatesHint');
  const timesEl = document.getElementById('bkTimes');
  const timesHint = document.getElementById('bkTimesHint');
  const chosenEl = document.getElementById('bkChosen');
  const warnEl = document.getElementById('bkWarn');
  const dateInput = document.getElementById('bkDate');
  const timesInput = document.getElementById('bkTimesInput');

  let slots = {};
  let selected = [];
  let anchor = null;

  const WEEKDAYS = ['\u041d\u0434', '\u041f\u043d', '\u0412\u0442', '\u0421\u0440', '\u0427\u0442', '\u041f\u0442', '\u0421\u0431'];
  const MONTHS = ['\u0441\u0456\u0447', '\u043b\u044e\u0442', '\u0431\u0435\u0440', '\u043a\u0432\u0456', '\u0442\u0440\u0430', '\u0447\u0435\u0440', '\u043b\u0438\u043f', '\u0441\u0435\u0440', '\u0432\u0435\u0440', '\u0436\u043e\u0432', '\u043b\u0438\u0441', '\u0433\u0440\u0443'];

  function fmt(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const wd = new Date(Date.UTC(y, m - 1, d)).getUTCDay();
    return { wd: WEEKDAYS[wd], day: d, mon: MONTHS[m - 1] };
  }
  function dayList() { return slots[dateInput.value] || []; }
  function warn(msg) { if (!msg) { warnEl.hidden = true; return; } warnEl.textContent = msg; warnEl.hidden = false; }

  async function loadSlots() {
    try {
      const res = await fetch('/api/slots');
      const data = await res.json();
      slots = data && data.ok && data.slots ? data.slots : {};
    } catch (_) { slots = {}; }
    renderDates();
  }

  function renderDates() {
    const dates = Object.keys(slots).sort();
    if (!dates.length) {
      datesHint.textContent = '\u041d\u0430\u0440\u0430\u0437\u0456 \u0432\u0456\u043b\u044c\u043d\u0438\u0445 \u0434\u0430\u0442 \u043d\u0435\u043c\u0430\u0454 \u2014 \u043d\u0430\u043f\u0438\u0448\u0438 \u0432 \u0441\u043e\u0446\u043c\u0435\u0440\u0435\u0436\u0456, \u0443\u0437\u0433\u043e\u0434\u0438\u043c\u043e \u0447\u0430\u0441.';
      datesEl.innerHTML = ''; timesEl.hidden = true; timesHint.hidden = true;
      return;
    }
    datesHint.hidden = true;
    datesEl.innerHTML = dates.map((iso) => {
      const l = fmt(iso);
      return '<button type="button" class="bk__date" data-date="' + iso + '">' +
        '<span class="wd">' + l.wd + '</span><span class="d">' + l.day + '</span><span class="m">' + l.mon + '</span></button>';
    }).join('');
  }

  function renderTimes(iso) {
    const list = slots[iso] || [];
    timesEl.innerHTML = list.map((s) =>
      s.b
        ? '<span class="bk__time bk__time--taken" aria-disabled="true">' + s.t + '<i>\u0437\u0430\u0439\u043d\u044f\u0442\u043e</i></span>'
        : '<button type="button" class="bk__time" data-time="' + s.t + '">' + s.t + '</button>'
    ).join('');
    timesEl.hidden = false; timesHint.hidden = false;
  }

  function paint() {
    timesEl.querySelectorAll('.bk__time').forEach((el) => {
      const t = el.dataset ? el.dataset.time : null;
      el.classList.toggle('on', !!t && selected.includes(t));
    });
    timesInput.value = selected.join(',');
    if (!selected.length) { chosenEl.hidden = true; return; }
    const [y, m, d] = dateInput.value.split('-');
    const label = selected.length === 1 ? selected[0]
      : selected[0] + '\u2013' + selected[selected.length - 1] + ' \u00b7 ' + selected.length + ' \u0433\u043e\u0434';
    chosenEl.textContent = '\u041e\u0431\u0440\u0430\u043d\u043e: ' + d + '.' + m + '.' + y + ', ' + label;
    chosenEl.hidden = false;
  }

  datesEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.bk__date');
    if (!btn) return;
    datesEl.querySelectorAll('.bk__date').forEach((b) => b.classList.remove('on'));
    btn.classList.add('on');
    dateInput.value = btn.dataset.date;
    selected = []; anchor = null; warn('');
    renderTimes(btn.dataset.date); paint();
  });

  timesEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.bk__time');
    if (!btn || !btn.dataset || !btn.dataset.time) return;
    const t = btn.dataset.time;
    const list = dayList();
    const idx = (x) => list.findIndex((s) => s.t === x);
    warn('');
    if (anchor !== null && selected.length === 1) {
      const i = idx(anchor), j = idx(t);
      if (i === -1 || j === -1) { anchor = t; selected = [t]; paint(); return; }
      if (i === j) { selected = []; anchor = null; paint(); return; }
      const lo = Math.min(i, j), hi = Math.max(i, j);
      const range = list.slice(lo, hi + 1);
      if (range.some((s) => s.b)) { anchor = t; selected = [t]; paint(); warn('\u041c\u0456\u0436 \u043d\u0438\u043c\u0438 \u0454 \u0437\u0430\u0439\u043d\u044f\u0442\u0430 \u0433\u043e\u0434\u0438\u043d\u0430 \u2014 \u043e\u0431\u0435\u0440\u0456\u0442\u044c \u0441\u0443\u0446\u0456\u043b\u044c\u043d\u0438\u0439 \u043f\u0440\u043e\u043c\u0456\u0436\u043e\u043a.'); return; }
      selected = range.map((s) => s.t); anchor = null; paint(); return;
    }
    if (selected.length === 1 && selected[0] === t) { selected = []; anchor = null; paint(); return; }
    anchor = t; selected = [t]; paint();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.textContent = ''; statusEl.className = 'status';
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.name || !data.contact) { statusEl.textContent = "\u0417\u0430\u043f\u043e\u0432\u043d\u0438 \u0456\u043c'\u044f \u0442\u0430 \u043a\u043e\u043d\u0442\u0430\u043a\u0442."; statusEl.className = 'status err'; return; }
    if (!data.date || !data.times) { statusEl.textContent = '\u041e\u0431\u0435\u0440\u0438 \u0434\u0430\u0442\u0443 \u0439 \u0445\u043e\u0447\u0430 \u0431 \u043e\u0434\u043d\u0443 \u0433\u043e\u0434\u0438\u043d\u0443.'; statusEl.className = 'status err'; return; }
    submitBtn.disabled = true;
    try {
      const res = await fetch('/api/book', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      let result = {}; try { result = await res.json(); } catch (_) {}
      if (res.status === 409) {
        statusEl.textContent = result.error || '\u041e\u0434\u043d\u0443 \u0437 \u0433\u043e\u0434\u0438\u043d \u0449\u043e\u0439\u043d\u043e \u0437\u0430\u0439\u043d\u044f\u043b\u0438 \u2014 \u043e\u0431\u0435\u0440\u0438 \u0437\u043d\u043e\u0432\u0443.'; statusEl.className = 'status err';
        selected = []; anchor = null; const keep = dateInput.value;
        await loadSlots();
        if (keep && slots[keep]) { const db = datesEl.querySelector('.bk__date[data-date="' + keep + '"]'); if (db) db.classList.add('on'); dateInput.value = keep; renderTimes(keep); }
        paint(); return;
      }
      if (!res.ok || !result.ok) throw new Error(result.error || '\u041f\u043e\u043c\u0438\u043b\u043a\u0430');
      form.reset(); dateInput.value = ''; timesInput.value = ''; selected = []; anchor = null;
      chosenEl.hidden = true; warn(''); timesEl.hidden = true; timesHint.hidden = true;
      datesEl.querySelectorAll('.bk__date').forEach((b) => b.classList.remove('on'));
      statusEl.textContent = '\u0417\u0430\u044f\u0432\u043a\u0443 \u043d\u0430\u0434\u0456\u0441\u043b\u0430\u043d\u043e! \u041e\u0447\u0456\u043a\u0443\u0454 \u043f\u0456\u0434\u0442\u0432\u0435\u0440\u0434\u0436\u0435\u043d\u043d\u044f \u2014 \u0437\u0432\u02bc\u044f\u0436\u0443\u0441\u044c \u0456\u0437 \u0442\u043e\u0431\u043e\u044e \u043d\u0430\u0439\u0431\u043b\u0438\u0436\u0447\u0438\u043c \u0447\u0430\u0441\u043e\u043c.'; statusEl.className = 'status ok';
      await loadSlots();
    } catch (err) {
      statusEl.textContent = '\u041d\u0435 \u0432\u0434\u0430\u043b\u043e\u0441\u044c \u0437\u0430\u0431\u0440\u043e\u043d\u044e\u0432\u0430\u0442\u0438. \u0421\u043f\u0440\u043e\u0431\u0443\u0439 \u0449\u0435 \u0440\u0430\u0437.'; statusEl.className = 'status err';
    } finally { submitBtn.disabled = false; }
  });

  loadSlots();
</script>
</body>
</html>
