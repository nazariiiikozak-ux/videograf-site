<style>
  :root{

    --ember:#C1702F; --ember-2:#E0A468; --line:rgba(243,236,226,0.12);
    --f-display:'Archivo Black',sans-serif; --f-body:'Archivo',sans-serif;
    --ok:#7FB069; --err:#e07a6a;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--f-body);
        min-height:100dvh; display:flex; align-items:center; justify-content:center;
        padding:32px 18px; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

  /* ---- blurred video backdrop ---- */
  .bg{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover;
       filter:blur(9px) saturate(1.05) brightness(0.7); transform:scale(1.12); }
  .bg-tint{ position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(70% 60% at 50% 40%, rgba(193,112,47,0.18), transparent 65%),
      linear-gradient(180deg, rgba(11,7,4,0.55), rgba(11,7,4,0.72)); }
  .grain{ position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* ---- glass card ---- */
  .card{ position:relative; z-index:5; width:100%; max-width:1040px;
    background:rgba(20,13,10,0.42);

    padding:30px 28px 26px; }

  .brand{ font-family:var(--f-display); font-size:15px; letter-spacing:0.04em; }
  .brand span{ color:var(--ember-2); }
  .card h1{ font-family:var(--f-display); font-size:clamp(30px,7vw,42px); line-height:0.95;
            margin-top:14px; }
  .card .sub{ color:var(--ink-mute); font-size:13px; margin-top:8px; }

  form{ display:flex; flex-direction:column; gap:16px; margin-top:22px; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .field{ display:flex; flex-direction:column; gap:7px; }
  .field > span{ font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-mute); }
  input[type=text], textarea{
    background:rgba(243,236,226,0.05); border:1px solid var(--line); border-radius:10px;
    padding:12px 13px; color:var(--ink); font-family:var(--f-body); font-size:14px; resize:vertical;
    transition:border-color .2s, background .2s; }
  input:focus, textarea:focus{ outline:none; border-color:var(--ember-2); background:rgba(193,112,47,0.06); }
  input::placeholder, textarea::placeholder{ color:var(--ink-mute); }
  .honeypot{ position:absolute; left:-9999px; width:1px; height:1px; opacity:0; }

  /* booking picker */
  .bk__hint{ font-size:12px; color:var(--ink-mute); }
  .bk__dates{ display:flex; gap:9px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; }
  .bk__dates::-webkit-scrollbar{ display:none; }
  .bk__date{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:2px;
    min-width:60px; padding:10px 9px; cursor:pointer; background:rgba(243,236,226,0.04);
    border:1px solid var(--line); border-radius:10px; color:var(--ink-dim); font-family:var(--f-body);
    transition:border-color .2s, background .2s, color .2s; }
  .bk__date:hover{ border-color:var(--ember-2); color:var(--ink); }
  .bk__date.on{ border-color:var(--ember-2); background:rgba(193,112,47,0.14); color:var(--ink); }
  .bk__date .wd{ font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-mute); }
  .bk__date.on .wd{ color:var(--ember-2); }
  .bk__date .d{ font-family:var(--f-display); font-size:19px; line-height:1; }
  .bk__date .m{ font-size:10px; text-transform:uppercase; color:var(--ink-mute); }
  .bk__times{ display:flex; flex-wrap:wrap; gap:8px; }
  .bk__time{ padding:8px 14px; cursor:pointer; background:rgba(243,236,226,0.04); border:1px solid var(--line);
    border-radius:999px; color:var(--ink-dim); font-family:var(--f-body); font-size:13px;
    font-variant-numeric:tabular-nums; transition:border-color .2s, background .2s, color .2s;
    display:inline-flex; align-items:center; gap:6px; }
  .bk__time:hover{ border-color:var(--ember-2); color:var(--ink); }
  .bk__time.on{ border-color:var(--ember-2); background:var(--ember); color:#160b06; font-weight:600; }
  .bk__time--taken{ cursor:not-allowed; opacity:0.55; border-style:dashed; color:var(--ink-mute); }
  .bk__time--taken:hover{ border-color:var(--line); color:var(--ink-mute); }
  .bk__time--taken i{ font-style:normal; font-size:9px; text-transform:uppercase; color:var(--ink-mute); }
  .bk__chosen{ font-size:13px; color:var(--ember-2); }
  .bk__warn{ font-size:12px; color:var(--ember-2); }

  .submit{ position:relative; overflow:hidden; border:none; cursor:pointer; margin-top:4px;
    padding:15px 24px; border-radius:999px; font-family:var(--f-body); font-size:12px; font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; color:#160b06;
    background:linear-gradient(180deg,var(--ember-2),var(--ember));
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.4), 0 8px 26px rgba(193,112,47,0.35);
    transition:transform .25s, box-shadow .25s; }
  .submit:hover{ transform:translateY(-2px); box-shadow:inset 0 1px 0 rgba(255,255,255,0.5), 0 12px 32px rgba(193,112,47,0.45); }
  .submit:disabled{ opacity:0.7; cursor:not-allowed; }
  .status{ font-size:13px; min-height:16px; text-align:center; }
  .status.ok{ color:var(--ember-2); } .status.err{ color:var(--err); }

  .socials{ display:flex; justify-content:center; gap:26px; margin-top:22px; padding-top:20px;
            border-top:1px solid var(--line); }
  .socials a{ color:var(--ink-mute); display:flex; transition:color .2s; }
  .socials a:hover{ color:var(--ember-2); }

  @media (max-width:440px){ .row{ grid-template-columns:1fr; } .card{ padding:24px 20px 22px; } }
  @media (prefers-reduced-motion:reduce){ .bg{ filter:blur(9px) brightness(0.7); } }
